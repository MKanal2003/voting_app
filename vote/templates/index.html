<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ option_a }} vs {{ option_b }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheets/style.css') }}" />
  </head>
  <body>
    <div class="card">

      <h1>{{ option_a }} vs {{ option_b }}</h1>
      <p class="subtitle">Cast your vote below — you can change it anytime</p>

      {% if vote %}
      <p class="voted-msg">
        You voted for <span>{{ option_a if vote == 'a' else option_b }}</span> ✓
      </p>
      {% endif %}

      <form class="buttons" method="POST" action="/">
        <button type="submit" name="vote" value="a" class="btn a">
          <span class="emoji">🐱</span>
          <span>{{ option_a }}</span>
          <span>→</span>
        </button>
        <button type="submit" name="vote" value="b" class="btn b">
          <span class="emoji">🐶</span>
          <span>{{ option_b }}</span>
          <span>→</span>
        </button>
      </form>

      <div class="hostname">Container: {{ hostname }}</div>
    </div>
  </body>
</html>
