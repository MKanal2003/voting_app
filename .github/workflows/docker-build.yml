name: Build and Push to Docker Hub

# Triggers: runs on every push to main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ---- Build and push Vote image ----
  vote:
    name: Vote App
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Vote
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vote:latest
            ${{ secrets.DOCKER_USERNAME }}/vote:${{ github.sha }}

  # ---- Build and push Worker image ----
  worker:
    name: Worker Service
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/worker:latest
            ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}

  # ---- Build and push Result image ----
  result:
    name: Result App
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Result
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/result:latest
            ${{ secrets.DOCKER_USERNAME }}/result:${{ github.sha }} 