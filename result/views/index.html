<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Cats vs Dogs — Live Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/stylesheets/style.css" />
  </head>
  <body>

    <div class="live-badge">
      <span class="live-dot"></span> Live
    </div>

    <h1>🗳️ Live Results</h1>
    <p class="subtitle">Updates automatically every second</p>

    <div class="results-card">

      <div class="candidate">
        <div class="candidate-header">
          <div class="candidate-name">
            <span class="candidate-emoji">🐱</span> Cats
          </div>
          <div class="candidate-percent" id="a-percent">50%</div>
        </div>
        <div class="bar-track">
          <div class="bar-fill bar-a" id="bar-a" style="width: 50%"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="candidate">
        <div class="candidate-header">
          <div class="candidate-name">
            <span class="candidate-emoji">🐶</span> Dogs
          </div>
          <div class="candidate-percent" id="b-percent">50%</div>
        </div>
        <div class="bar-track">
          <div class="bar-fill bar-b" id="bar-b" style="width: 50%"></div>
        </div>
      </div>

      <div class="total">
        Total votes: <span id="total">0</span>
      </div>

    </div>

    <script src="socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
